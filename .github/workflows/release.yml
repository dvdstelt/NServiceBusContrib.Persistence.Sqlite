name: release
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
permissions:
  contents: read
jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet restore src/NServiceBusContrib.Persistence.Sqlite.slnx
      - run: dotnet build src/NServiceBusContrib.Persistence.Sqlite.slnx -c Release --no-restore
      - run: dotnet test src/NServiceBusContrib.Persistence.Sqlite.slnx -c Release --no-build
      - run: dotnet pack src/NServiceBusContrib.Persistence.Sqlite/NServiceBusContrib.Persistence.Sqlite.csproj -c Release --no-build -o artifacts
      - run: dotnet pack src/NServiceBusContrib.Persistence.Sqlite.TransactionalSession/NServiceBusContrib.Persistence.Sqlite.TransactionalSession.csproj -c Release --no-build -o artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.*nupkg
      - run: dotnet nuget push "artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate
