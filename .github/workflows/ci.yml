name: ci
on:
  push:
    branches: [main, master, 'feat/**', 'feature/**']
  pull_request:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet restore src/Messaging.Persistence.Sqlite.slnx
      - run: dotnet build src/Messaging.Persistence.Sqlite.slnx -c Release --no-restore
      - run: dotnet test src/Messaging.Persistence.Sqlite.slnx -c Release --no-build
